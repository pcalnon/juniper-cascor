---
#####################################################################################################################################################################################################
# Project:       Juniper
# Sub-Project:   JuniperCascor
# Application:   juniper_cascor
# File Name:     ci.yml
# Author:        Paul Calnon
# Version:       0.4.1
#
# Date Created:  2026-01-24
# Last Modified: 2026-01-29
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    GitHub Actions CI/CD Pipeline for Juniper Cascor Cascade Correlation Neural Network
#    - Pre-commit hooks for code quality (black, isort, flake8, mypy, bandit)
#    - Unit tests with coverage enforcement
#    - Integration tests
#    - Security scanning (Gitleaks, Bandit SARIF, pip-audit)
#    - Proper failure handling (no continue-on-error for critical steps)
#    - Dependency caching for performance
#
# References:
#    - CASCOR-P1-007: CI/CD Pipeline Setup
#    - CASCOR-P2-002: CI Coverage Gates
#    - Best practices: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions
#####################################################################################################################################################################################################

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - fix/**
  pull_request:
    branches:
      - main
      - develop
  repository_dispatch:
    types: [data-client-updated, cascor-worker-updated]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ENV_NAME: JuniperCascor
  PYTHON_TEST_VERSION: "3.13"
  COVERAGE_FAIL_UNDER: "80"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Pre-commit: Code Quality Checks (runs across multiple Python versions)
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  pre-commit:
    name: Pre-commit (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12","3.13"]
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Cache pre-commit hooks
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Run pre-commit hooks
        env:
          # Skip local test hooks in CI: they require local conda env.
          # Coverage is enforced by the dedicated unit-tests job with proper conda setup.
          SKIP: pytest-unit,coverage-gate
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       Juniper Cascor - Pre-commit Checks                   ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo "Note: pytest-unit and coverage-gate hooks skipped in CI"
          echo "      (handled by dedicated unit-tests job with full environment)"
          pre-commit run --all-files --show-diff-on-failure

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Docs: Validate documentation link integrity
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  docs:
    name: Documentation Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Validate Documentation Links
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       Juniper Cascor - Documentation Link Validation      ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          python scripts/check_doc_links.py --exclude templates --exclude history

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Unit Tests: Run unit tests with coverage enforcement
  # MED-009: Added Python version matrix for multi-version testing
  # Migrated from conda to pip for CI portability (polyrepo Phase 5)
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  unit-tests:
    name: Unit Tests + Coverage (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [pre-commit]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       Juniper Cascor - Install Dependencies                ║"
          echo "║       Python ${{ matrix.python-version }}                                        ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          python -m pip install --upgrade pip
          # Install CPU-only PyTorch first (CI doesn't need CUDA)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # Install juniper-data-client from git (not yet published to PyPI)
          # juniper-data-client requires Python >=3.12 and is not yet on PyPI
          python -c "import sys; sys.exit(0 if sys.version_info >= (3,12) else 1)" && \
            pip install "juniper-data-client @ git+https://github.com/pcalnon/juniper-data-client.git@main" || true
          # Install project deps via editable install to keep source-tree
          # path resolution intact (constants resolve config paths via __file__)
          pip install -e ".[all]"

      - name: Create required directories
        run: |
          mkdir -p logs src/logs reports/junit reports/htmlcov

      - name: Run Unit Tests
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       Juniper Cascor - Unit Tests (Fast Only)              ║"
          echo "╚════════════════════════════════════════════════════════════╝"

          python -m pytest \
            -m "unit and not slow" \
            src/tests/unit \
            --verbose \
            --timeout=60 \
            --maxfail=5 \
            --junitxml=reports/junit/junit-unit.xml \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/htmlcov

      - name: Enforce Coverage Gate (80%)
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       Juniper Cascor - Coverage Gate Enforcement           ║"
          echo "╚════════════════════════════════════════════════════════════╝"

          python -m coverage report --fail-under=${COVERAGE_FAIL_UNDER}

      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        if: always()
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: |
            reports/coverage.xml
            reports/htmlcov/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        if: always()
        with:
          name: unit-test-results-py${{ matrix.python-version }}
          path: reports/junit/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Quick Integration Tests: Run on all branches (MED-010)
  # Migrated from conda to pip for CI portability (polyrepo Phase 5)
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  quick-integration-tests:
    name: Quick Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1

      - name: Set up Python ${{ env.PYTHON_TEST_VERSION }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_TEST_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # juniper-data-client requires Python >=3.12 and is not yet on PyPI
          python -c "import sys; sys.exit(0 if sys.version_info >= (3,12) else 1)" && \
            pip install "juniper-data-client @ git+https://github.com/pcalnon/juniper-data-client.git@main" || true
          pip install -e ".[all]"

      - name: Create required directories
        run: |
          mkdir -p logs src/logs reports/junit

      - name: Run Quick Integration Tests
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       Juniper Cascor - Quick Integration Tests             ║"
          echo "╚════════════════════════════════════════════════════════════╝"

          python -m pytest \
            -m "integration and not slow" \
            src/tests/integration \
            --timeout=60 \
            --maxfail=2 \
            -q \
            --junitxml=reports/junit/junit-quick-integration.xml

      - name: Upload Quick Integration Test Results
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        if: always()
        with:
          name: quick-integration-test-results
          path: reports/junit/
          retention-days: 14

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Full Integration Tests: Run integration tests (PRs and main/develop pushes only)
  # Migrated from conda to pip for CI portability (polyrepo Phase 5)
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  integration-tests:
    name: Full Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: github.event_name == 'pull_request' || github.ref_name == 'main' || github.ref_name == 'develop'

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1

      - name: Set up Python ${{ env.PYTHON_TEST_VERSION }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_TEST_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # juniper-data-client requires Python >=3.12 and is not yet on PyPI
          python -c "import sys; sys.exit(0 if sys.version_info >= (3,12) else 1)" && \
            pip install "juniper-data-client @ git+https://github.com/pcalnon/juniper-data-client.git@main" || true
          pip install -e ".[all]"

      - name: Create required directories
        run: |
          mkdir -p logs src/logs reports/junit

      - name: Run Integration Tests (Fast Only)
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       Juniper Cascor - Integration Tests (Fast Only)       ║"
          echo "╚════════════════════════════════════════════════════════════╝"

          python -m pytest \
            -m "integration and not slow" \
            src/tests/integration \
            --verbose \
            --timeout=120 \
            --maxfail=3 \
            --junitxml=reports/junit/junit-integration.xml

      - name: Upload Integration Test Results
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        if: always()
        with:
          name: integration-test-results
          path: reports/junit/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Build: Verify package can be built
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [unit-tests]

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_TEST_VERSION }}
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       Juniper Cascor - Build Package                       ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          python -m build --sdist --wheel

      - name: Upload build artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: dist
          path: dist/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Dependency Docs: Generate dependency documentation artifacts
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  dependency-docs:
    name: Dependency Documentation
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ env.PYTHON_TEST_VERSION }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_TEST_VERSION }}
          cache: pip

      - name: Setup Conda (Miniforge)
        uses: conda-incubator/setup-miniconda@fc2d68f6413eb2d87b895e92f8584b5b94a10167  # v3.3.0
        with:
          miniforge-version: latest
          auto-activate-base: true
          python-version: ${{ env.PYTHON_TEST_VERSION }}

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       Juniper Cascor - Install Dependencies (Dep Docs)    ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # juniper-data-client requires Python >=3.12 and is not yet on PyPI
          python -c "import sys; sys.exit(0 if sys.version_info >= (3,12) else 1)" && \
            pip install "juniper-data-client @ git+https://github.com/pcalnon/juniper-data-client.git@main" || true
          pip install -e ".[all]"

      - name: Generate Dependency Documentation
        shell: bash -l {0}
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       Juniper Cascor - Generate Dependency Docs           ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          bash scripts/generate_dep_docs.sh

      - name: Upload Dependency Documentation
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: dependency-docs
          path: |
            conf/requirements_ci.txt
            conf/requirements_ci_*.txt
            conf/conda_environment_ci.yaml
            conf/conda_environment_ci_*.yaml
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Security: Run security scans (Gitleaks, Bandit, pip-audit)
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  security:
    name: Security Scans
    runs-on: ubuntu-latest
    needs: [pre-commit]

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks (Secrets Detection)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          fail: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Create reports directory
        run: mkdir -p reports/security

      - name: Run Bandit (SAST) -> SARIF
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       Juniper Cascor - Bandit Security Scan                ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          bandit -r src -f sarif -o reports/security/bandit.sarif || true

      - name: Upload Bandit SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e  # v4.32.4
        if: always()
        with:
          sarif_file: reports/security/bandit.sarif
        continue-on-error: true

      - name: Run pip-audit (Dependency Vulnerabilities)
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       Juniper Cascor - pip-audit Dependency Scan           ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          # Create requirements from pyproject.toml deps for auditing
          pip install torch numpy h5py pyyaml matplotlib
          pip freeze > reports/security/pip-freeze.txt
          # CRIT-005: Fail on high/critical vulnerabilities instead of just warning
          pip-audit -r reports/security/pip-freeze.txt --strict --desc on \
            || (echo "::error::Critical/High vulnerabilities found in dependencies" && exit 1)

      - name: Upload Security Reports
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        if: always()
        with:
          name: security-reports
          path: reports/security/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Lockfile Check: Verify requirements.lock matches pyproject.toml
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  lockfile-check:
    name: Lockfile Freshness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Check lockfile freshness
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       Juniper Cascor - Lockfile Freshness Check           ║"
          echo "╚════════════════════════════════════════════════════════════╝"

          uv pip compile pyproject.toml \
            --extra ml \
            --extra api \
            --extra observability \
            --extra juniper-data \
            --index-strategy unsafe-best-match \
            --no-emit-package torch \
            -o /tmp/requirements.lock.check

          if ! diff -u <(tail -n +3 requirements.lock) <(tail -n +3 /tmp/requirements.lock.check); then
            echo ""
            echo "::error::requirements.lock is stale — run: uv pip compile pyproject.toml --extra ml --extra api --extra observability --extra juniper-data --index-strategy unsafe-best-match --no-emit-package torch -o requirements.lock"
            exit 1
          fi

          echo "::notice::requirements.lock is up to date ✓"

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Docker Build & Smoke Test: Verify Dockerfile builds and container starts
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  docker-build:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request' || github.ref_name == 'main' || github.ref_name == 'develop'

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build Docker Image
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       Juniper Cascor - Docker Build                       ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          docker build -t juniper-cascor:ci-${{ github.sha }} .

      - name: Verify Container Starts
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       Juniper Cascor - Docker Smoke Test                  ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          docker run -d --name juniper-cascor-test \
            -p 8200:8200 \
            juniper-cascor:ci-${{ github.sha }}

          echo "Waiting for service to become healthy..."
          for i in $(seq 1 30); do
            if docker inspect --format='{{.State.Health.Status}}' juniper-cascor-test 2>/dev/null | grep -q healthy; then
              echo "Service is healthy!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "::error::Service did not become healthy within 30 attempts"
              docker logs juniper-cascor-test
              exit 1
            fi
            sleep 2
          done

      - name: Verify Package Import
        run: |
          docker exec juniper-cascor-test python -c "import juniper_cascor; print(juniper_cascor.__version__)"

      - name: Verify Health Endpoint
        run: |
          curl -sf http://localhost:8200/v1/health | python3 -m json.tool

      - name: Cleanup
        if: always()
        run: |
          docker stop juniper-cascor-test 2>/dev/null || true
          docker rm juniper-cascor-test 2>/dev/null || true

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Required Checks Aggregator: Final quality gate
  # MED-010: Added quick-integration-tests to required checks
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  required-checks:
    name: Quality Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [pre-commit, unit-tests, quick-integration-tests, integration-tests, build, dependency-docs, security, docs, lockfile-check, docker-build]

    steps:
      - name: Check Quality Gate Status
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       Juniper Cascor - Quality Gate Status                 ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "Pre-commit:             ${{ needs.pre-commit.result }}"
          echo "Unit Tests:             ${{ needs.unit-tests.result }}"
          echo "Quick Integration:      ${{ needs.quick-integration-tests.result }}"
          echo "Full Integration Tests: ${{ needs.integration-tests.result }}"
          echo "Build:                  ${{ needs.build.result }}"
          echo "Dependency Docs:        ${{ needs.dependency-docs.result }}"
          echo "Security:               ${{ needs.security.result }}"
          echo "Documentation:          ${{ needs.docs.result }}"
          echo "Lockfile Check:         ${{ needs.lockfile-check.result }}"
          echo "Docker Build:           ${{ needs.docker-build.result }}"
          echo ""

          # Pre-commit and unit-tests MUST pass
          if [[ "${{ needs.pre-commit.result }}" != "success" ]]; then
            echo "::error::Pre-commit checks failed"
            exit 1
          fi

          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "::error::Unit tests failed"
            exit 1
          fi

          # Quick integration tests MUST pass (runs on all branches)
          if [[ "${{ needs.quick-integration-tests.result }}" != "success" ]]; then
            echo "::error::Quick integration tests failed"
            exit 1
          fi

          # Build MUST pass
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "::error::Build failed"
            exit 1
          fi

          # Security should pass (but SARIF upload failures are allowed)
          if [[ "${{ needs.security.result }}" == "failure" ]]; then
            echo "::error::Security scans failed"
            exit 1
          fi

          # Full integration tests: failure = error, skipped = OK (for feature branches)
          if [[ "${{ needs.integration-tests.result }}" == "failure" ]]; then
            echo "::error::Full integration tests failed"
            exit 1
          fi

          # Dependency docs: failure = error, skipped = OK (non-blocking)
          if [[ "${{ needs.dependency-docs.result }}" == "failure" ]]; then
            echo "::error::Dependency documentation generation failed"
            exit 1
          fi

          # Documentation link validation must pass
          if [[ "${{ needs.docs.result }}" != "success" ]]; then
            echo "::error::Documentation link validation failed"
            exit 1
          fi

          # Lockfile must be fresh (stale lockfile = Docker builds don't match CI)
          if [[ "${{ needs.lockfile-check.result }}" != "success" ]]; then
            echo "::error::Lockfile freshness check failed — requirements.lock is stale"
            exit 1
          fi

          # Docker build: failure = error, skipped = OK (only runs on PRs and main/develop)
          if [[ "${{ needs.docker-build.result }}" == "failure" ]]; then
            echo "::error::Docker build and smoke test failed"
            exit 1
          fi

          echo "::notice::Quality Gate PASSED ✓"

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Notify: Build status notification
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  notify:
    name: Build Notification
    runs-on: ubuntu-latest
    needs: [required-checks]
    if: always()

    steps:
      - name: Build Status Summary
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       Juniper Cascor - Build Complete                      ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "========== CI/CD Pipeline Summary =============================="
          echo "Status:   ${{ needs.required-checks.result }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Branch:   ${{ github.ref_name }}"
          echo "Commit:   ${{ github.sha }}"
          echo "Actor:    ${{ github.actor }}"
          echo "Event:    ${{ github.event_name }}"
          echo "================================================================"
