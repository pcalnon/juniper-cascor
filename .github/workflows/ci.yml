---
#####################################################################################################################################################################################################
# Project:       Juniper
# Sub-Project:   JuniperCascor
# Application:   juniper_cascor
# File Name:     ci.yml
# Author:        Paul Calnon
# Version:       0.3.16
#
# Date Created:  2026-01-24
# Last Modified: 2026-01-24
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    GitHub Actions CI/CD Pipeline for Juniper Cascor Cascade Correlation Neural Network
#    - Runs tests on every push and PR
#    - Generates coverage reports
#    - Enforces quality gates
#    - Supports conda environment setup
#
# References:
#    - CASCOR-P1-007: CI/CD Pipeline Setup
#    - Based on JuniperCanopy CI/CD workflow pattern
#####################################################################################################################################################################################################

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - fix/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Linting Tools
        run: |
          echo "Installing Linting Tools..."
          echo -ne "\n╔════════════════════════════════════════════════════════════╗\n"
          echo "║       Juniper Cascor - Installing Linting Tools             ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          python -m pip install --upgrade pip
          pip install black isort mypy flake8 flake8-bugbear flake8-comprehensions flake8-simplify

      - name: Run Black (Format Check)
        run: |
          echo "Running Black..."
          echo -ne "\n╔════════════════════════════════════════════════════════════╗\n"
          echo "║       Juniper Cascor - Running Black (Format Check)         ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          black --check --diff src/ || true
        continue-on-error: true

      - name: Run isort (Import Sort Check)
        run: |
          echo "Running isort..."
          echo -ne "\n╔════════════════════════════════════════════════════════════╗\n"
          echo "║       Juniper Cascor - Running isort (Import Sort Check)    ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          isort --check-only --diff src/ || true
        continue-on-error: true

      - name: Run Flake8 (Linter)
        run: |
          echo "Running Flake8..."
          echo -ne "\n╔════════════════════════════════════════════════════════════╗\n"
          echo "║       Juniper Cascor - Running Flake8 (Linter)              ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          flake8 src/ \
              --count \
              --select=B,C,E,F,W,T4,B9 \
              --extend-ignore=E203,E266,E501,W503 \
              --max-line-length=120 \
              --max-complexity=15 \
              --show-source \
              --statistics \
              --exit-zero
        continue-on-error: true

      - name: Run MyPy (Type Checker)
        run: |
          echo "Running MyPy..."
          echo -ne "\n╔════════════════════════════════════════════════════════════╗\n"
          echo "║       Juniper Cascor - Running MyPy (Type Checker)          ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          mypy src/ --ignore-missing-imports --no-strict-optional || true
        continue-on-error: true

  test:
    name: Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python-version }}
          channels: conda-forge,pytorch,nvidia
          conda-remove-defaults: true
          miniforge-version: latest
          use-mamba: true
          channel-priority: flexible
          activate-environment: JuniperCascor
          environment-file: conf/conda_environment.yaml
          auto-activate-base: false

      - name: Verify Conda Environment
        shell: bash -el {0}
        run: |
          echo "Verifying Conda Environment..."
          echo -ne "\n╔════════════════════════════════════════════════════════════╗\n"
          echo "║       Juniper Cascor - Verify Conda Environment             ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          conda list -n JuniperCascor
          which python
          python --version
          pip --version
        continue-on-error: true

      - name: Free Disk Space
        run: |
          echo "Freeing disk space..."
          echo -ne "\n╔════════════════════════════════════════════════════════════╗\n"
          echo "║       Juniper Cascor - Free Disk Space                      ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          df -h
          conda clean --all -y || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          df -h
        continue-on-error: true

      - name: Install Test Dependencies
        shell: bash -el {0}
        run: |
          echo "Installing test dependencies..."
          echo -ne "\n╔════════════════════════════════════════════════════════════╗\n"
          echo "║       Juniper Cascor - Install Test Dependencies            ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          pip install pytest pytest-cov pytest-timeout pytest-xdist

      - name: Verify Test Files
        shell: bash -el {0}
        run: |
          echo "Verifying Test Files..."
          echo -ne "\n╔════════════════════════════════════════════════════════════╗\n"
          echo "║       Juniper Cascor - Verify Test Files                    ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo -ne "\n========== Test Directory Structure ==========================\n"
          ls -la src/tests/
          echo -ne "\n========== Test Files ========================================\n"
          find src/tests -name "test_*.py" -type f | head -30
          echo -ne "\n========== Creating Required Directories =====================\n"
          mkdir -p logs
          mkdir -p src/logs
          mkdir -p reports/junit
          mkdir -p src/tests/reports
          echo "Created logs/, src/logs/, reports/junit/, src/tests/reports/"
        continue-on-error: true

      # CASCOR-TIMEOUT-001: Exclude slow tests from default CI run
      # Slow tests (marked with @pytest.mark.slow) involve full neural network
      # training and can take 2-5+ minutes. These are run separately.
      - name: Run Unit Tests (Fast Only)
        shell: bash -el {0}
        run: |
          echo "Running Unit Tests (excluding slow tests)..."
          echo -ne "\n╔════════════════════════════════════════════════════════════╗\n"
          echo "║       Juniper Cascor - Run Unit Tests (Fast Only)           ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          cd src/tests
          python -m pytest unit/ \
            --verbose \
            --timeout=60 \
            --cov=../cascade_correlation \
            --cov=../candidate_unit \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/htmlcov \
            --junitxml=reports/junit.xml \
            -m "unit and not slow" \
            --maxfail=10 \
            || true

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: |
            src/tests/reports/coverage.xml
            src/tests/reports/htmlcov/
          retention-days: 30
        if: always()

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: src/tests/reports/junit.xml
          retention-days: 30
        if: always()

      - name: Test Summary
        shell: bash -el {0}
        run: |
          echo "Compiling Test Summary..."
          echo -ne "\n╔════════════════════════════════════════════════════════════╗\n"
          echo "║       Juniper Cascor - Test Summary                         ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo -ne "\n=== Unit Tests Completed ===\n"
          if [ -f src/tests/reports/coverage.xml ]; then
            echo "Coverage report generated: src/tests/reports/coverage.xml"
          fi
          if [ -f src/tests/reports/junit.xml ]; then
            echo "JUnit report generated: src/tests/reports/junit.xml"
          fi

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test]

    strategy:
      matrix:
        python-version: ["3.14"]

    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python-version }}
          channels: conda-forge,pytorch,nvidia
          conda-remove-defaults: true
          miniforge-version: latest
          use-mamba: true
          channel-priority: flexible
          activate-environment: JuniperCascor
          environment-file: conf/conda_environment.yaml
          auto-activate-base: false

      - name: Install Test Dependencies
        shell: bash -el {0}
        run: |
          echo "Installing test dependencies..."
          pip install pytest pytest-cov pytest-timeout pytest-xdist

      - name: Create Required Directories
        run: |
          mkdir -p logs src/logs reports/junit src/tests/reports

      # CASCOR-TIMEOUT-001: Exclude slow tests from integration CI run
      # Slow tests (marked with @pytest.mark.slow) involve full neural network
      # training and require extended timeouts (300s per test).
      - name: Run Integration Tests (Fast Only)
        shell: bash -el {0}
        run: |
          echo "Running Integration Tests (excluding slow tests)..."
          echo -ne "\n╔════════════════════════════════════════════════════════════╗\n"
          echo "║       Juniper Cascor - Run Integration Tests (Fast Only)    ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          cd src/tests
          python -m pytest integration/ \
            --verbose \
            --timeout=120 \
            -m "integration and not slow" \
            --maxfail=5 \
            || true
        continue-on-error: true

      - name: Integration Test Summary
        shell: bash -el {0}
        run: |
          echo "Compiling Summary for Integration Tests..."
          echo -ne "\n╔════════════════════════════════════════════════════════════╗\n"
          echo "║       Juniper Cascor - Integration Test Summary             ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo -ne "\n=== Integration Tests Completed ===\n"
          echo "Note: Some tests may require extended timeout for training operations"

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()

    steps:
      - name: Check Quality Gate
        run: |
          echo "Checking Quality Gate..."
          echo -ne "\n╔════════════════════════════════════════════════════════════╗\n"
          echo "║       Juniper Cascor - Quality Gate Status                  ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo " "
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "::error::Tests failed - Quality gate FAILED"
            exit 1
          elif [[ "${{ needs.lint.result }}" == "failure" ]]; then
            echo "::warning::Linting failed - Consider fixing before merge"
          else
            echo "::notice::Quality gate PASSED ✓"
          fi

  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: always()

    steps:
      - name: Build Status
        run: |
          echo "Building Status Notification..."
          echo -ne "\n╔════════════════════════════════════════════════════════════╗\n"
          echo "║       Juniper Cascor - Build Status Notification            ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo -ne "\n====== CI/CD Pipeline Complete ===============================\n"
          echo "Status: ${{ needs.quality-gate.result }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
