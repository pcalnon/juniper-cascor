#####################################################################################################################################################################################################
# Project:       Juniper
# Sub-Project:   JuniperCascor
# Application:   juniper_cascor
# File Name:     .pre-commit-config.yaml
# Author:        Paul Calnon
# Version:       0.4.2
#
# Date Created:  2026-01-29
# Last Modified: 2026-01-31
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    Pre-commit hooks configuration for Juniper Cascor
#    Runs code quality checks locally before commit and in CI
#
# Setup:
#    pip install pre-commit
#    pre-commit install
#    pre-commit run --all-files
#
# References:
#    - https://pre-commit.com/
#    - CASCOR-P1-007: CI/CD Pipeline Setup
#####################################################################################################################################################################################################

# Minimum pre-commit version required
minimum_pre_commit_version: "3.0.0"

# Default settings for all hooks
default_language_version:
  python: python3.13

# Exclude patterns (files/directories to skip)
# exclude: |
#   (?x)^(
#     data/.*|
#     logs/.*|
#     reports/.*|
#     htmlcov/.*|
#     images/.*|
#     \.git/.*|
#     \.pytest_cache/.*|
#     __pycache__/.*|
#     \.trunk/.*
#   )$

# Exclude patterns (files/directories to skip)
exclude: |
  (?x)^(
      \.git/|
      \.venv/|
      venv/|
      __pycache__/|
      \.pytest_cache/|
      \.mypy_cache/|
      data/|
      prompts/|
      reports/|
      resources/|
      logs/|
      images/|
      .*\.egg-info/|
      .*\.ipynb_checkpoints/.*|
      .*/backups/.*|
      .*-ORIG\.py$|
      .*\.bak$|
      .*\.orig$|
      .*~$
  )$

repos:
  # ═══════════════════════════════════════════════════════════════════════════
  # General file checks
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        name: Check YAML syntax
      - id: check-toml
        name: Check TOML syntax
      - id: check-json
        name: Check JSON syntax
      - id: end-of-file-fixer
        name: Fix end of files
      - id: trailing-whitespace
        name: Trim trailing whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: check-added-large-files
        name: Check for large files
        args: [--maxkb=1000]
      - id: check-case-conflict
        name: Check case conflicts
      - id: check-ast
        name: Check Python AST
      - id: debug-statements
        name: Check for debug statements
      - id: detect-private-key
        name: Detect private keys

  # ═══════════════════════════════════════════════════════════════════════════
  # Python Code Formatting - Black
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        name: Format with Black
        args:
          - --line-length=512
        files: ^src/

  # ═══════════════════════════════════════════════════════════════════════════
  # Python Import Sorting - isort
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: Sort imports with isort
        args:
          - --profile=black
          - --line-length=512
        files: ^src/

  # ═══════════════════════════════════════════════════════════════════════════
  # Python Linting - Flake8 (Source Code)
  # LOW-001: Enabled C901 complexity warnings (removed from ignore list)
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        name: Lint source with Flake8
        args:
          - --max-line-length=512
          # MED-004: Re-enabled E722 (bare except) and F401 (unused imports)
          # LOW-001: Removed C901 to enable complexity warnings
          - --extend-ignore=E203,E265,E266,E501,W503,E402,E226,C409,B008,B904,B905,B907
          - --max-complexity=15
          - --select=B,C,E,F,W,T4,B9
        additional_dependencies:
          - flake8-bugbear>=24.0.0
          - flake8-comprehensions>=3.14.0
          - flake8-simplify>=0.21.0
        files: ^src/
        exclude: ^src/tests/

  # ═══════════════════════════════════════════════════════════════════════════
  # Python Linting - Flake8 (Tests - Relaxed Rules) - HIGH-006
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        name: Lint tests with Flake8 (relaxed)
        args:
          - --max-line-length=512
          # More relaxed for tests: allow long lines, complexity, some style issues
          - --extend-ignore=E203,E265,E266,E501,W503,E722,E402,E226,C409,C901,B008,B904,B905,B907,F401,F811
          - --max-complexity=25
          - --select=B,C,E,F,W,T4,B9
        additional_dependencies:
          - flake8-bugbear>=24.0.0
          - flake8-comprehensions>=3.14.0
          - flake8-simplify>=0.21.0
        files: ^src/tests/

  # ═══════════════════════════════════════════════════════════════════════════
  # Python Type Checking - MyPy
  # HIGH-005: Incrementally re-enabling mypy error codes
  # Phase 1: Enabled misc, call-arg, func-returns-value, no-redef (zero/few violations)
  # Phase 2 TODO: Enable override, str-bytes-safe, call-overload (1 violation each)
  # Phase 3 TODO: Enable return, assignment (2-6 violations, need code fixes)
  # Phase 4 TODO: Enable arg-type, var-annotated, has-type (8-11 violations, need code fixes)
  # Phase 5 TODO: Enable attr-defined, return-value (major refactoring needed)
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        name: Type check with MyPy
        args:
          - --ignore-missing-imports
          - --no-strict-optional
          - --python-version=3.13
          # Phase 1: Enabled (zero/few violations)
          # misc, call-arg, func-returns-value, no-redef - ENABLED
          # Phase 2+ TODO: Still disabled (need code fixes)
          - --disable-error-code=attr-defined
          - --disable-error-code=return-value
          - --disable-error-code=arg-type
          - --disable-error-code=assignment
          - --disable-error-code=override
          - --disable-error-code=var-annotated
          - --disable-error-code=index
          - --disable-error-code=has-type
          - --disable-error-code=str-bytes-safe
          - --disable-error-code=call-overload
          - --disable-error-code=return
        files: ^src/(cascade_correlation|candidate_unit|spiral_problem|snapshots)/
        exclude: ^src/tests/
        additional_dependencies:
          - types-PyYAML
          - types-requests
          - torch

  # ═══════════════════════════════════════════════════════════════════════════
  # Security Scanning - Bandit (Source Code)
  # NOTE: Bandit runs on files passed by pre-commit, not on directories
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        name: Security scan source with Bandit
        args:
          - -q
          - --skip=B101,B311
          # B101: assert_used (common in tests)
          # B311: random (not used for security)
        files: ^src/.*\.py$
        exclude: ^src/tests/

  # ═══════════════════════════════════════════════════════════════════════════
  # Security Scanning - Bandit (Tests - Relaxed Rules) - HIGH-006
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        name: Security scan tests with Bandit (relaxed)
        args:
          - -q
          - --skip=B101,B311
          # B101: assert_used (tests use assertions extensively)
          # B311: random (not used for security in tests)
        files: ^src/tests/.*\.py$

  # ═══════════════════════════════════════════════════════════════════════════
  # Markdown Linting
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint
        name: Lint Markdown files
        args:
          - --config=./.markdownlint.yaml
          - --fix
        files: \.(md|markdown)$
        exclude: ^(CHANGELOG\.md|notes/|docs/)

  # ═══════════════════════════════════════════════════════════════════════════
  # Shell Script Linting - shellcheck
  # MED-013: Changed severity from error to warning to catch more issues
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        name: Lint shell scripts
        args:
          - --severity=warning
        files: \.(sh|bash)$
        exclude: (.*-ORIG\.bash$|.*-local\.bash$|no_canopy\.bash$|last_mod_update\.bash$|backups/|temp/)

  # ═══════════════════════════════════════════════════════════════════════════
  # YAML Linting - yamllint
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        name: Lint YAML files
        args: [--format, parsable, -d, relaxed]
        types: [yaml]

# CI configuration (for pre-commit.ci service, if used)
ci:
  autofix_prs: false
  autoupdate_schedule: monthly
  # NOTE: mypy runs separately in CI workflow with full environment

# NOTE: MyPy is temporarily disabled until type annotations are fixed
# To re-enable, remove the 'skip' entry above and set 'pass_filenames: true' below
